spring.application.name=SSOJ

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

worker.poll-delay-ms=1000
worker.max-concurrency=2
worker.executor.cpp.image=gcc:13
worker.executor.cpp.compile-command=g++ main.cpp -O2 -std=c++17 -o main
worker.executor.cpp.run-command=./main
worker.executor.java.image=eclipse-temurin:17-jdk
worker.executor.python.image=python:3.11
