spring.application.name=SSOJ

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ssoj}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Worker entrypoint mode:
# - redis-polling: enable Redis queue polling consumer
# - http-trigger: enable internal HTTP trigger controller
#
# Worker role:
# - orchestrator: DB-backed judge orchestration + final persistence
# - runner: execution-only HTTP runner, no DB/Redis orchestration
worker.role=orchestrator
worker.mode=redis-polling

# Dispatch mode:
# - redis: push submissionId to Redis queue
# - cloud-tasks: reserved for remote operating path
judge.dispatch.mode=redis
judge.dispatch.redis.queue-key=judge:queue

# Execution mode:
# - docker: execute with local Docker-based executors
# - remote: delegate execution to HTTP-based remote runner
judge.execution.mode=docker
judge.execution.remote.base-url=http://localhost:8081
judge.execution.remote.execute-path=/internal/runner-executions
judge.execution.remote.connect-timeout-ms=2000
judge.execution.remote.read-timeout-ms=30000
judge.execution.remote.supported-languages=java,python,cpp

worker.poll-delay-ms=1000
worker.max-concurrency=2
worker.executor.cpp.image=gcc:13
worker.executor.cpp.compile-command=g++ main.cpp -O2 -std=c++17 -o main
worker.executor.cpp.run-command=./main
worker.executor.java.image=eclipse-temurin:17-jdk
worker.executor.python.image=python:3.11
