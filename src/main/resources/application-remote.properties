# Orchestrator profile:
# Cloud Tasks dispatch + remote runner execution
# This profile is intended for Cloud Run orchestrator deployment.
worker.role=orchestrator
worker.mode=http-trigger
judge.dispatch.mode=cloud-tasks
judge.execution.mode=remote
judge.execution.remote.base-url=${JUDGE_EXECUTION_REMOTE_BASE_URL:http://localhost:8081}
judge.execution.remote.execute-path=/internal/runner-executions
judge.execution.remote.connect-timeout-ms=5000
judge.execution.remote.read-timeout-ms=180000
judge.dispatch.cloud-tasks.project-id=${JUDGE_DISPATCH_CLOUD_TASKS_PROJECT_ID:}
judge.dispatch.cloud-tasks.location=${JUDGE_DISPATCH_CLOUD_TASKS_LOCATION:asia-northeast3}
judge.dispatch.cloud-tasks.queue-name=${JUDGE_DISPATCH_CLOUD_TASKS_QUEUE_NAME:ssoj-judge}
judge.dispatch.cloud-tasks.target-url=${JUDGE_DISPATCH_CLOUD_TASKS_TARGET_URL:http://localhost:8080/internal/judge-executions}
judge.dispatch.cloud-tasks.service-account-email=${JUDGE_DISPATCH_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL:}
judge.dispatch.cloud-tasks.oidc-audience=${JUDGE_DISPATCH_CLOUD_TASKS_OIDC_AUDIENCE:}
