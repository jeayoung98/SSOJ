# Runner profile:
# execution-only HTTP runner using local Docker executors
# The runner returns execution results only and does not access DB state.
worker.role=runner
worker.mode=runner
judge.execution.mode=docker
judge.runner.max-concurrent-executions=${JUDGE_RUNNER_MAX_CONCURRENT_EXECUTIONS:4}
worker.executor.workspace-root=/tmp/ssoj-runner-workspaces
worker.executor.warm-container.enabled=false
worker.executor.warm-container.pool-size=${JUDGE_RUNNER_MAX_CONCURRENT_EXECUTIONS:5}
worker.executor.warm-container.fallback-to-docker-run=true
worker.executor.warm-container.max-use-count=100
worker.executor.warm-container.startup-timeout-ms=10000
worker.executor.warm-container.acquire-timeout-ms=3000
worker.executor.warm-container.cleanup-timeout-ms=3000
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration,org.springframework.boot.data.jpa.autoconfigure.DataJpaRepositoriesAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
spring.data.jpa.repositories.enabled=false
spring.data.redis.repositories.enabled=false
